<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="12" y1="10" x2="106" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="24" y1="18" x2="90" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E4ECFF"/>
    </linearGradient>
    <linearGradient id="tileBlue" x1="50" y1="46" x2="68" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="tilePink" x1="72" y1="68" x2="90" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="cardShadow" x="10" y="8" width="100" height="104" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="tileShadow" x="0" y="0" width="140" height="140" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.26"/>
    </filter>
  </defs>
  <style>
    .card { animation: float 7s ease-in-out infinite; transform-origin: 60px 60px; transition: transform 160ms ease; }
    .card:hover { transform: translateY(-2px) scale(1.02); }
    .tile.match { animation: pulse 2.4s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; filter: drop-shadow(0 0 6px rgba(255,255,255,0.8)); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect width="120" height="120" rx="18" fill="url(#bgGradient)"/>

  <g filter="url(#cardShadow)" class="card">
    <rect x="18" y="18" width="64" height="86" rx="13" fill="rgba(255,255,255,0.35)" stroke="#1E293B" stroke-width="2.5"/>
    <rect x="36" y="32" width="64" height="86" rx="13" fill="url(#cardGradient)" stroke="#0F172A" stroke-width="3"/>

    <path d="M68 30h18" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <path d="M44 106h44" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 5"/>

    <g filter="url(#tileShadow)">
      <rect x="50" y="46" width="18" height="18" rx="4" fill="url(#tileBlue)"/>
      <rect x="72" y="46" width="18" height="18" rx="4" fill="#F8FAFC" stroke="#CBD5F5" stroke-width="2"/>
      <rect x="50" y="68" width="18" height="18" rx="4" fill="#F8FAFC" stroke="#CBD5F5" stroke-width="2"/>
      <rect x="72" y="68" width="18" height="18" rx="4" fill="url(#tilePink)" class="tile match"/>

      <path d="M54 55l5 5 9-9" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M76 77l5 5 9-9" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="81" cy="77" r="3" fill="#FDE68A" stroke="#FCD34D" stroke-width="1.5"/>
      <circle cx="59" cy="55" r="3" fill="#FDE68A" stroke="#FCD34D" stroke-width="1.5"/>
    </g>

    <path d="M60 64 C68 58 78 58 88 64" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 6"/>
  </g>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M20 32l2 4 4 2-4 2-2 4-2-4-4-2 4-2 2-4z"/>
    <path d="M98 22l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
    <path d="M98 96l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
  </g>
</svg>
