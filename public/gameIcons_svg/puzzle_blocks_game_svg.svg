<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGradientBlocks" x1="12" y1="10" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="blockBlue" x1="20" y1="20" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="blockPink" x1="84" y1="48" x2="104" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="blockShadow" x="6" y="10" width="108" height="104" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 7s ease-in-out infinite; transform-origin: 60px 60px; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.85; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect width="120" height="120" rx="18" fill="url(#bgGradientBlocks)"/>

  <g filter="url(#blockShadow)" class="float">
    <rect x="20" y="20" width="36" height="36" rx="8" fill="url(#blockBlue)" stroke="#0F172A" stroke-width="1.5"/>
    <rect x="64" y="20" width="36" height="24" rx="8" fill="#F8FAFC" stroke="#CBD5F5" stroke-width="2"/>
    <rect x="64" y="48" width="18" height="36" rx="6" fill="#0F172A" opacity="0.9"/>
    <rect x="84" y="48" width="16" height="36" rx="6" fill="url(#blockPink)" class="pulse"/>
    <rect x="20" y="64" width="40" height="24" rx="6" fill="#E8EEFC" stroke="#2563EB" stroke-width="3"/>
  </g>

  <path d="M20 98h80" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6" opacity="0.7"/>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M18 30l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
    <path d="M102 26l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
  </g>
</svg>
