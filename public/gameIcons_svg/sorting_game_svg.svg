<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGradientSorting" x1="12" y1="10" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="20" y1="24" x2="100" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E4ECFF"/>
    </linearGradient>
    <linearGradient id="accentPinkSorting" x1="90" y1="34" x2="102" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="barShadow" x="6" y="10" width="108" height="104" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 7s ease-in-out infinite; transform-origin: 60px 60px; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.85; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect width="120" height="120" rx="18" fill="url(#bgGradientSorting)"/>

  <g filter="url(#barShadow)" class="float">
    <rect x="20" y="24" width="16" height="72" rx="6" fill="url(#barGradient)" stroke="#2563EB" stroke-width="3"/>
    <rect x="52" y="24" width="16" height="72" rx="6" fill="url(#barGradient)" stroke="#2563EB" stroke-width="3"/>
    <rect x="84" y="24" width="16" height="72" rx="6" fill="url(#barGradient)" stroke="#2563EB" stroke-width="3"/>

    <circle cx="28" cy="40" r="7" fill="#22D3EE" stroke="#0F172A" stroke-width="1.5" class="pulse"/>
    <rect x="55" y="34" width="10" height="12" rx="3" fill="#0F172A" opacity="0.9"/>
    <polygon points="92,38 98,48 86,48" fill="url(#accentPinkSorting)" stroke="#0F172A" stroke-width="1.2"/>

    <circle cx="28" cy="64" r="7" fill="#CBD5F5" stroke="#0F172A" stroke-width="1.2"/>
    <rect x="55" y="58" width="10" height="12" rx="3" fill="#2563EB"/>
    <polygon points="92,62 98,72 86,72" fill="#0F172A" opacity="0.85" stroke="#0F172A" stroke-width="1.2"/>
  </g>

  <path d="M24 94h72" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6" opacity="0.7"/>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M16 26l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
    <path d="M102 22l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
  </g>
</svg>
