<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGradientMath" x1="12" y1="10" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="20" y1="26" x2="104" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E4ECFF"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="64" y1="42" x2="84" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="panelShadow" x="6" y="14" width="108" height="92" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 7s ease-in-out infinite; transform-origin: 60px 60px; }
    .glow { animation: pulse 2.6s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.82; } 50% { opacity: 1; filter: drop-shadow(0 0 6px rgba(255,255,255,0.8)); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect width="120" height="120" rx="18" fill="url(#bgGradientMath)"/>

  <g filter="url(#panelShadow)" class="float">
    <rect x="14" y="26" width="92" height="64" rx="14" fill="rgba(255,255,255,0.35)" stroke="#1E293B" stroke-width="2"/>
    <rect x="20" y="30" width="80" height="60" rx="12" fill="url(#panelGradient)" stroke="#0F172A" stroke-width="3"/>

    <path d="M36 48h16" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <path d="M44 40v16" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

    <path d="M64 42h18" stroke="url(#accentGreen)" stroke-width="4.5" stroke-linecap="round" class="glow"/>
    <path d="M64 54h18" stroke="#10B981" stroke-width="4.5" stroke-linecap="round"/>

    <path d="M44 72h10" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <path d="M64 68h18" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    <path d="M73 60v16" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    <circle cx="92" cy="72" r="4.2" fill="#0F172A"/>
  </g>

  <path d="M20 92h80" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6" opacity="0.7"/>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M16 30l1.6 3.2 3.2 1.6-3.2 1.6-1.6 3.2-1.6-3.2-3.2-1.6 3.2-1.6 1.6-3.2z"/>
    <path d="M104 20l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
  </g>
</svg>
