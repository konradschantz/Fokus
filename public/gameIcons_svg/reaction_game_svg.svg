<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="12" y1="10" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#99F6E4"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="badge" x1="32" y1="28" x2="88" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2ED4D4"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="bolt" x1="54" y1="38" x2="78" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF08A"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="shadow" x="6" y="6" width="108" height="108" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 6s ease-in-out infinite; transform-origin: 60px 60px; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; transform-origin: 60px 60px; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.86; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.05); } }
  </style>

  <rect width="120" height="120" rx="22" fill="url(#bg)"/>

  <g filter="url(#shadow)" class="float">
    <circle cx="60" cy="60" r="40" fill="url(#badge)" stroke="#7C3AED" stroke-width="4.2"/>
    <circle cx="60" cy="60" r="46" stroke="#C084FC" stroke-width="2.6" stroke-dasharray="8 7" opacity="0.75"/>
    <path d="M66 36h-10l-8 22h10l-8 30 28-36H70l6-16z" fill="url(#bolt)" stroke="#0F172A" stroke-width="3" stroke-linejoin="round" class="pulse"/>
  </g>
</svg>
