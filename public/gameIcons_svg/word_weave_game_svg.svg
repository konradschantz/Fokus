<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGradientWeave" x1="12" y1="10" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="barGradientWeave" x1="20" y1="28" x2="100" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E4ECFF"/>
    </linearGradient>
    <filter id="barShadowWeave" x="6" y="16" width="108" height="92" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 7s ease-in-out infinite; transform-origin: 60px 60px; }
    .pulse { animation: pulse 2.6s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-1px); } 50% { transform: translateY(2px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.82; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect width="120" height="120" rx="18" fill="url(#bgGradientWeave)"/>

  <g filter="url(#barShadowWeave)" class="float">
    <rect x="20" y="28" width="80" height="16" rx="7" fill="url(#barGradientWeave)" stroke="#2563EB" stroke-width="3"/>
    <rect x="20" y="52" width="56" height="16" rx="7" fill="#E8EEFC" stroke="#2563EB" stroke-width="3"/>
    <rect x="20" y="76" width="80" height="16" rx="7" fill="url(#barGradientWeave)" stroke="#2563EB" stroke-width="3"/>

    <path d="M44 36c0 6 8 10 16 6s14-2 16 4" stroke="#10B981" stroke-width="3.2" stroke-linecap="round" class="pulse"/>
    <path d="M48 60c6 0 10 6 16 6s10-2 14 2" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 4"/>

    <circle cx="96" cy="36" r="6.5" fill="#10B981" stroke="#0F172A" stroke-width="1.2"/>
    <circle cx="80" cy="60" r="6.5" fill="#2563EB" stroke="#0F172A" stroke-width="1.2"/>
    <circle cx="96" cy="84" r="6.5" fill="#0F172A" opacity="0.9" stroke="#0F172A" stroke-width="1.2"/>
  </g>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M18 30l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
    <path d="M104 24l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5 1.5-3z"/>
  </g>
</svg>
