<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientWordSearch" x1="16" y1="12" x2="184" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="gridStroke" x1="32" y1="32" x2="168" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="panelShadowWord" x="0" y="0" width="200" height="200" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .float { animation: float 7s ease-in-out infinite; transform-origin: 100px 100px; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .spark { animation: twinkle 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(-2px); } 50% { transform: translateY(3px); } }
    @keyframes pulse { 0%, 100% { opacity: 0.82; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.04); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>

  <rect x="8" y="8" width="184" height="184" rx="32" fill="url(#bgGradientWordSearch)"/>

  <g filter="url(#panelShadowWord)" class="float">
    <rect x="16" y="16" width="168" height="168" rx="28" fill="#0F172A" opacity="0.8" stroke="#0B1B3D" stroke-width="2"/>
    <rect x="26" y="26" width="148" height="148" rx="22" fill="#0C1C3F" stroke="url(#gridStroke)" stroke-width="4"/>

    <g stroke="#1F3B7A" stroke-width="3">
      <line x1="50" y1="50" x2="150" y2="50" />
      <line x1="50" y1="82" x2="150" y2="82" />
      <line x1="50" y1="114" x2="150" y2="114" />
      <line x1="50" y1="146" x2="150" y2="146" />
      <line x1="50" y1="50" x2="50" y2="146" />
      <line x1="82" y1="50" x2="82" y2="146" />
      <line x1="114" y1="50" x2="114" y2="146" />
      <line x1="146" y1="50" x2="146" y2="146" />
    </g>

    <g font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" fill="#E6EDFF" font-size="20" text-anchor="middle">
      <text x="66" y="75">F</text>
      <text x="98" y="75">O</text>
      <text x="130" y="75">K</text>
      <text x="66" y="107">U</text>
      <text x="98" y="107">S</text>
      <text x="130" y="107">R</text>
      <text x="66" y="139">O</text>
      <text x="98" y="139">L</text>
      <text x="130" y="139">G</text>
    </g>

    <circle cx="140" cy="60" r="26" fill="rgba(91, 107, 255, 0.22)" stroke="#7CE8C8" stroke-width="4" class="pulse"/>
    <path d="M160 86L176 102" stroke="#7CE8C8" stroke-width="8" stroke-linecap="round" class="pulse"/>
  </g>

  <g class="spark" fill="#F8FAFC" stroke="#E0F2FE" stroke-width="1">
    <path d="M26 34l2.5 5 5 2.5-5 2.5-2.5 5-2.5-5-5-2.5 5-2.5 2.5-5z"/>
    <path d="M172 30l2.5 5 5 2.5-5 2.5-2.5 5-2.5-5-5-2.5 5-2.5 2.5-5z"/>
  </g>
</svg>
